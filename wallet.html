<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المحفظة - مكسب برو</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand mb-0" href="index.html">مكسب <span>برو</span></a>
        <div class="d-flex align-items-center gap-2">
          <button
            id="customerNotificationsButton"
            class="btn btn-outline-light btn-sm d-none position-relative"
            onclick="toggleCustomerNotifications()"
            title="الإشعارات"
          >
            <i class="fa-solid fa-bell"></i>
            <span
              id="customerNotificationsBadge"
              class="badge-counter d-none"
            ></span>
          </button>
          <a class="btn btn-outline-light btn-sm" href="index.html">
            <i class="fa-solid fa-arrow-left"></i> العودة للموقع
          </a>
        </div>
      </div>
    </nav>

    <div
      id="customerNotificationsPanel"
      class="notifications-panel d-none"
    ></div>
    <main class="container py-5 mt-5">
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="p-4 rounded-4 shadow-sm bg-white">
            <h5 class="fw-bold mb-4">محفظتي</h5>
            <div class="mb-4">
              <small class="text-muted d-block mb-2">الرصيد الحالي</small>
              <p id="current-balance" class="fs-1 fw-bold mb-0">0.00 ج.م</p>
            </div>
            <div id="walletNotificationsContainer" class="mb-3"></div>
            <div class="row g-3">
              <div class="col-6">
                <div class="p-3 rounded-4 bg-light text-center">
                  <small class="text-muted d-block mb-1">المعلق</small>
                  <strong id="pending-profit">0.00 ج.م</strong>
                </div>
              </div>
              <div class="col-6">
                <div class="p-3 rounded-4 bg-light text-center">
                  <small class="text-muted d-block mb-1">المسحوب</small>
                  <strong id="total-withdrawn">0.00 ج.م</strong>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="p-4 rounded-4 shadow-sm bg-white">
            <h5 class="fw-bold mb-4">طلب سحب الأرباح</h5>
            <div class="mb-3">
              <label class="form-label small">طريقة السحب</label>
              <select class="form-select" id="withdrawMethod">
                <option value="vodafone">فودافون كاش</option>
                <option value="instapay">انستا باي</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label small">رقم المحفظة</label>
              <input
                type="text"
                class="form-control"
                id="withdrawNumber"
                placeholder="010xxxxxxxx"
              />
            </div>
            <div class="mb-3">
              <label class="form-label small">المبلغ</label>
              <input
                type="number"
                class="form-control"
                id="withdrawAmount"
                min="50"
                placeholder="50 ج.م أو أكثر"
              />
            </div>
            <button
              type="button"
              class="btn btn-primary w-100"
              onclick="confirmWithdraw()"
            >
              تأكيد السحب
            </button>
          </div>
        </div>
      </div>

      <div class="mt-4">
        <div class="p-4 rounded-4 shadow-sm bg-white">
          <h6 class="fw-bold mb-3">سجل المعاملات</h6>
          <div
            id="transactionList"
            class="transaction-list rounded-4 border p-3 bg-light"
          >
            <p class="text-center text-muted mb-0">
              سجّل دخولك أولاً لعرض المحفظة.
            </p>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="wallet.js"></script>
    <script src="main.js"></script>
  </body>
</html>

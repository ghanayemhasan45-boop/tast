<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ملخص مبيعاتي - مكسب برو</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light">
    <nav
      class="navbar navbar-expand-lg fixed-top"
      style="background-color: #2d1b69"
    >
      <div class="container d-flex justify-content-between">
        <a class="navbar-brand text-white fw-bold" href="index.html"
          >مكسب <span style="color: #00d084">برو</span></a
        >
        <div class="d-flex align-items-center gap-2">
          <button
            id="customerNotificationsButton"
            class="btn btn-outline-light btn-sm d-none position-relative"
            onclick="toggleCustomerNotifications()"
            title="الإشعارات"
          >
            <i class="fa-solid fa-bell"></i>
            <span
              id="customerNotificationsBadge"
              class="badge-counter d-none"
            ></span>
          </button>
          <a href="index.html" class="btn btn-outline-light btn-sm"
            ><i class="fa-solid fa-arrow-right"></i> العودة للرئيسية</a
          >
        </div>
      </div>
    </nav>

    <div
      id="customerNotificationsPanel"
      class="notifications-panel d-none"
    ></div>
    <div class="container" style="margin-top: 100px; margin-bottom: 50px">
      <h2 class="fw-bold mb-4" style="color: #2d1b69">
        📊 ملخص مبيعاتي وإحصائياتي
      </h2>

      <div
        id="salesSummaryContent"
        class="bg-white p-4 rounded-4 shadow-sm border"
      >
        <div class="text-center py-5">
          جاري التحقق من هويتك وسحب البيانات... <br />
          <i
            class="fa-solid fa-spinner fa-spin fa-2x mt-3"
            style="color: #00d084"
          ></i>
        </div>
      </div>
    </div>

    <script type="module" src="auth.js"></script>
    <script src="main.js"></script>
    <script type="module" src="report.js"></script>
  </body>
</html>
